<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PixBooth - Choose Your Layout</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Caveat:wght@400..700&family=Special+Elite&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script src="js/tailwind-config.js"></script>
    <link href="css/shared.css" rel="stylesheet" />
    <link href="css/index.css" rel="stylesheet" />
</head>

<body class="font-display">
    <div class="noise-overlay"></div>
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
        <div class="flex h-full grow flex-col">
            <div class="px-4 sm:px-10 md:px-20 lg:px-40 flex flex-1 justify-center py-5">
                <div class="flex flex-col w-full max-w-[960px] flex-1">

                    <!-- Header -->
                    <header class="flex items-center justify-between py-6 animate-fade-in-up">
                        <div class="flex items-center gap-2 scrapbook-btn px-6 py-2 transform -rotate-1">
                            <span class="material-symbols-outlined text-primary text-3xl"
                                style="font-variation-settings: 'FILL' 1;">photo_camera</span>
                            <h2 class="text-3xl font-handwritten font-black tracking-tight">PixBooth</h2>
                        </div>
                        <a href="gallery.html"
                            class="scrapbook-btn px-4 py-2 flex items-center gap-2 font-bold text-sm transform rotate-1">
                            <span class="material-symbols-outlined text-lg">photo_library</span>
                            <span class="hidden sm:inline">Gallery</span>
                        </a>
                    </header>

                    <main class="flex-grow">
                        <!-- Title Section -->
                        <div
                            class="flex flex-wrap justify-center text-center gap-3 p-4 mb-8 animate-fade-in-up stagger-1">
                            <div class="flex w-full flex-col gap-1 relative">
                                <p
                                    class="text-primary font-handwritten text-6xl sm:text-7xl md:text-8xl font-black leading-tight transform -rotate-2 drop-shadow-sm">
                                    Choose Your Layout</p>
                                <p class="text-text-dark/80 font-typewriter text-base sm:text-lg font-bold leading-relaxed max-w-md mx-auto transform rotate-1">
                                    Select your preferred photo arrangement to begin your session.</p>
                            </div>
                        </div>

                        <!-- Layout Cards -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-5 p-4 mb-10">

                            <!-- Strip 3 -->
                            <div class="layout-card polaroid-frame animate-fade-in-up stagger-1 flex flex-col group gap-2 transition-transform duration-300 cursor-pointer relative"
                                data-layout="strip3" data-rows="3" data-cols="1" data-name="Strip 3" role="button"
                                tabindex="0" aria-label="Strip 3 layout — 3 photos, vertical">
                                <div class="masking-tape top-[-8px] left-1/2 -translate-x-1/2 w-14 h-5 transform rotate-2"></div>
                                <div
                                    class="w-full aspect-[2/3] flex flex-col p-1 gap-2 justify-center items-center">
                                    <div class="preview-slot w-full flex-1 rounded-sm shadow-sm"></div>
                                    <div class="preview-slot w-full flex-1 rounded-sm shadow-sm"></div>
                                    <div class="preview-slot w-full flex-1 rounded-sm shadow-sm"></div>
                                </div>
                                <div class="text-center mt-2">
                                    <p class="font-handwritten text-primary text-2xl font-bold leading-none transform -rotate-1">Strip 3</p>
                                    <p class="font-typewriter text-text-dark/60 text-xs font-bold leading-normal mt-1">3 Photos, Vert</p>
                                </div>
                            </div>

                            <!-- Strip 4 -->
                            <div class="layout-card polaroid-frame animate-fade-in-up stagger-2 flex flex-col group gap-2 transition-transform duration-300 cursor-pointer relative"
                                data-layout="strip4" data-rows="4" data-cols="1" data-name="Strip 4" role="button"
                                tabindex="0" aria-label="Strip 4 layout — 4 photos, vertical">
                                <div class="masking-tape top-[-6px] right-2 w-12 h-5 transform -rotate-6"></div>
                                <div
                                    class="w-full aspect-[2/3] flex flex-col p-1 gap-1.5 justify-center items-center">
                                    <div class="preview-slot w-full flex-1 rounded-sm shadow-sm"></div>
                                    <div class="preview-slot w-full flex-1 rounded-sm shadow-sm"></div>
                                    <div class="preview-slot w-full flex-1 rounded-sm shadow-sm"></div>
                                    <div class="preview-slot w-full flex-1 rounded-sm shadow-sm"></div>
                                </div>
                                <div class="text-center mt-2">
                                    <p class="font-handwritten text-primary text-2xl font-bold leading-none transform rotate-1">Strip 4</p>
                                    <p class="font-typewriter text-text-dark/60 text-xs font-bold leading-normal mt-1">4 Photos, Vert</p>
                                </div>
                            </div>

                            <!-- 2x2 Grid -->
                            <div class="layout-card polaroid-frame animate-fade-in-up stagger-3 flex flex-col group gap-2 transition-transform duration-300 cursor-pointer relative"
                                data-layout="grid2x2" data-rows="2" data-cols="2" data-name="2x2 Grid" role="button"
                                tabindex="0" aria-label="2 by 2 grid layout — 4 photos, square">
                                <div class="masking-tape bottom-2 right-[-8px] w-12 h-5 transform rotate-45"></div>
                                <div class="masking-tape top-[-6px] left-2 w-12 h-5 transform rotate-6"></div>
                                <div
                                    class="w-full aspect-[2/3] grid grid-cols-2 grid-rows-2 p-1 gap-2">
                                    <div class="preview-slot rounded-sm shadow-sm"></div>
                                    <div class="preview-slot rounded-sm shadow-sm"></div>
                                    <div class="preview-slot rounded-sm shadow-sm"></div>
                                    <div class="preview-slot rounded-sm shadow-sm"></div>
                                </div>
                                <div class="text-center mt-2">
                                    <p class="font-handwritten text-primary text-2xl font-bold leading-none transform -rotate-2">2x2 Grid</p>
                                    <p class="font-typewriter text-text-dark/60 text-xs font-bold leading-normal mt-1">4 Photos, Square</p>
                                </div>
                            </div>

                            <!-- Row 3 -->
                            <div class="layout-card polaroid-frame animate-fade-in-up stagger-4 flex flex-col group gap-2 transition-transform duration-300 cursor-pointer relative"
                                data-layout="row3" data-rows="1" data-cols="3" data-name="Row 3" role="button"
                                tabindex="0" aria-label="Row 3 layout — 3 photos, horizontal">
                                <div class="masking-tape top-[-8px] left-1/2 -translate-x-1/2 w-16 h-5 transform -rotate-1"></div>
                                <div class="w-full aspect-[2/3] flex flex-col justify-center p-1 gap-2">
                                    <div class="flex-1 flex gap-2 w-full pt-6 pb-6 mt-12 mb-12">
                                        <div class="preview-slot flex-1 h-full rounded-sm shadow-sm"></div>
                                        <div class="preview-slot flex-1 h-full rounded-sm shadow-sm"></div>
                                        <div class="preview-slot flex-1 h-full rounded-sm shadow-sm"></div>
                                    </div>
                                    <!-- Empty space is naturally handled by the flex-1 container above now -->
                                </div>
                                <div class="text-center mt-2">
                                    <p class="font-handwritten text-primary text-2xl font-bold leading-none transform rotate-1">Row 3</p>
                                    <p class="font-typewriter text-text-dark/60 text-xs font-bold leading-normal mt-1">3 Photos, Horiz</p>
                                </div>
                            </div>
                        </div>

                        <!-- Begin Button -->
                        <div class="flex px-4 py-3 justify-center mb-10 animate-fade-in-up stagger-5">
                            <button id="beginSessionBtn" disabled
                                class="scrapbook-btn-primary flex min-w-[84px] w-full max-w-sm cursor-pointer items-center justify-center h-16 px-5 transition-all text-2xl font-handwritten leading-normal disabled:opacity-40 disabled:cursor-not-allowed transform hover:rotate-2">
                                <span class="truncate">Begin Session</span>
                                <span class="material-symbols-outlined ml-2">arrow_forward</span>
                            </button>
                        </div>
                    </main>


                </div>
            </div>
        </div>
        <script src="js/index.js"></script>
</body>

</html>

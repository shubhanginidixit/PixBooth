<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PixBooth - Live Gallery</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Caveat:wght@400..700&family=Special+Elite&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script src="js/tailwind-config.js"></script>
    <link href="css/shared.css" rel="stylesheet" />
    <link href="css/gallery.css" rel="stylesheet" />
    <script src="js/db.js"></script>
</head>

<body class="font-display min-h-screen">
    <div class="noise-overlay"></div>
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden p-4 sm:p-8">
        <!-- Header -->
        <header class="flex items-center justify-between py-4 sm:py-6 animate-fade-in-up">
            <div class="flex items-center gap-3 scrapbook-btn px-5 py-3 transform -rotate-2">
                <span class="material-symbols-outlined text-primary text-xl">photo_library</span>
                <h1 class="text-text-dark text-2xl font-handwritten font-black tracking-tight drop-shadow-sm">Live Gallery</h1>
            </div>
            <a href="index.html"
                class="scrapbook-btn px-4 py-3 flex items-center gap-2 font-bold text-sm transform rotate-1">
                <span class="material-symbols-outlined text-lg">add_a_photo</span>
                <span class="hidden sm:inline">New Photo</span>
            </a>
        </header>

        <!-- Main Content -->
        <main class="flex-1 w-full max-w-7xl mx-auto py-8 z-10 animate-fade-in-up delay-1">
            <div id="emptyState"
                class="hidden flex-col items-center justify-center p-12 polaroid-frame bg-[#fffdf5] mt-12 text-center text-text-dark max-w-lg mx-auto relative transform rotate-1">
                <div class="masking-tape top-[-10px] left-1/2 -translate-x-1/2 w-20 h-6 transform -rotate-3"></div>
                <span class="material-symbols-outlined text-6xl mb-4 text-primary opacity-80">no_photography</span>
                <h2 class="text-4xl font-handwritten mb-2 font-bold">No photos yet!</h2>
                <p class="font-typewriter text-text-dark/80 max-w-md mx-auto mb-6 text-sm font-bold">Pin up your first photos by hitting the booth and saving your layout.</p>
                <a href="index.html"
                    class="scrapbook-btn-primary px-8 py-3 font-bold flex items-center justify-center gap-2 w-max mx-auto h-12">
                    <span class="material-symbols-outlined">camera</span> Start Session
                </a>
            </div>

            <!-- Masonry Grid -->
            <div id="galleryGrid" class="gallery-grid columns-1 sm:columns-2 md:columns-3 lg:columns-4 gap-4 w-full">
                <!-- Gallery items will be injected here via javascript -->
            </div>
        </main>
    </div>

    <!-- Image Modal -->
    <div id="imageModal"
        class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <button id="closeModalBtn" class="absolute top-6 right-6 text-text-light hover:text-primary transition-colors hover:scale-110 transform z-50">
            <span class="material-symbols-outlined text-4xl">close</span>
        </button>
        <img id="modalImg" src=""
            class="max-w-[95%] max-h-[90vh] object-contain shadow-polaroid border-[12px] border-b-[40px] border-white scale-95 transition-transform duration-300 transform rounded-sm" />
    </div>

    <script src="js/gallery.js"></script>
</body>

</html>
